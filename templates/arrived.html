<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ถึงจุดหมายแล้ว — ห้อง {{ room_id }}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/arrived.css') }}">
</head>
<body>

    <canvas id="canvas"></canvas>
    <div class="grid"></div>
    <div class="scan"></div>
    <div class="br tl"></div>
    <div class="br tr"></div>
    <div class="br bl"></div>
    <div class="br br2"></div>

    <div class="page">

        <div class="success-ring">
            <div class="ring ring-a"></div>
            <div class="ring ring-b"></div>
            <div class="ring ring-c"></div>
            <div class="check-circle">
                <i class="fas fa-check" aria-hidden="true"></i>
            </div>
        </div>

        <div class="text-block">
            <span class="arrived-title">ถึงจุดหมายแล้ว!</span>
            <span class="room-label">ห้อง {{ room_id }}</span>
            <span class="sub-text">ขอบคุณที่ใช้บริการ UDRU CCE Navigation Robot</span>
        </div>

        {% set info = room_info %}
        {% if info and info.subjects %}
        <div class="info-card">
            <div class="info-label">
                <i class="fas fa-book-open" style="margin-right:6px"></i>วิชาที่สอนในห้องนี้
            </div>
            <div class="info-text">{{ info.subjects }}</div>
        </div>
        {% endif %}

        <div class="btn-group">
            <a href="/" class="btn btn-home">
                <i class="fas fa-house"></i> กลับหน้าหลัก
            </a>
            <button class="btn btn-return" onclick="returnToBase()">
                <i class="fas fa-rotate-left"></i> ส่งหุ่นกลับ
            </button>
        </div>

        <p class="countdown">
            กลับหน้าหลักอัตโนมัติใน <span id="count">30</span> วินาที
        </p>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="{{ url_for('static', filename='js/arrived.js') }}"></script>
</body>
</html>
